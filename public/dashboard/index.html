<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>沙盘大屏 - 教师端</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC',-apple-system,sans-serif;background:#0A0E27;color:#e0e0e0}

/* 顶部导航 */
.nav-bar{display:flex;align-items:center;padding:0 24px;height:50px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-item{padding:8px 20px;font-size:13px;color:#666;cursor:pointer;border-radius:6px;margin-right:8px;transition:all .2s}
.nav-item.active{background:rgba(0,229,255,0.12);color:#00E5FF;font-weight:600}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn-nav{padding:6px 16px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-mock{background:rgba(255,193,7,0.15);color:#FFC107;border:1px solid rgba(255,193,7,0.3)}
.btn-mock.on{background:rgba(0,229,255,0.15);color:#00E5FF;border-color:rgba(0,229,255,0.3)}
.btn-crisis{background:rgba(255,23,68,0.15);color:#FF1744;border:1px solid rgba(255,23,68,0.3)}
.btn-reset{background:rgba(255,255,255,0.08);color:#aaa;border:1px solid rgba(255,255,255,0.1)}
.btn-reset{background:rgba(255,255,255,0.08);color:#aaa;border:1px solid rgba(255,255,255,0.1)}

/* 相位指示灯 */
.phase-light{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;transition:all .3s;opacity:0.35}
.phase-light.active{opacity:1;background:rgba(0,229,255,0.08)}
.phase-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:all .3s}
.phase-light.active .phase-dot{background:#00E5FF;box-shadow:0 0 10px rgba(0,229,255,0.6)}
.phase-light.active .phase-label{color:#00E5FF}
.phase-label{font-size:11px;color:#555;transition:all .3s}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.on{background:#00E5FF;box-shadow:0 0 8px rgba(0,229,255,0.5)}
.status-dot.off{background:#666}

/* 主体布局 */
.main{display:flex;flex:1;height:calc(100vh - 50px - 56px - 90px)}
.panel{position:relative;overflow:hidden}
.panel-left{width:40%;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column}
.panel-right{width:60%;display:flex;flex-direction:column}

.chart-container{flex:1;position:relative}

.panel-label{position:absolute;top:12px;left:16px;font-size:12px;color:#666;z-index:10;text-transform:uppercase;letter-spacing:2px}

/* 底部战报 → PK排行榜 */
.pk-leaderboard{height:90px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;overflow-x:auto;overflow-y:hidden;gap:10px;padding:0 12px;scroll-behavior:smooth}
.pk-leaderboard::-webkit-scrollbar{height:3px}
.pk-leaderboard::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

.pk-card{flex-shrink:0;width:130px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;transition:all .4s;position:relative;overflow:hidden}
.pk-card.survive{border-color:rgba(0,229,255,0.2)}
.pk-card.bankrupt{border-color:rgba(255,23,68,0.2);opacity:0.55}
.pk-card.top1{border-color:rgba(255,215,0,0.6);box-shadow:0 0 12px rgba(255,215,0,0.15)}
.pk-card.top2{border-color:rgba(192,192,192,0.4);box-shadow:0 0 8px rgba(192,192,192,0.1)}
.pk-card.top3{border-color:rgba(205,127,50,0.4);box-shadow:0 0 8px rgba(205,127,50,0.1)}
.pk-card .rank-badge{position:absolute;top:-2px;right:4px;font-size:22px;opacity:0.9}
.pk-card .team-name{font-size:11px;font-weight:700;color:#eee;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pk-card .team-rate{font-size:20px;font-weight:800;margin:2px 0}
.pk-card.survive .team-rate{color:#00E5FF}
.pk-card.bankrupt .team-rate{color:#FF1744}
.pk-card .rate-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin:3px 0;overflow:hidden}
.pk-card .rate-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.pk-card.survive .rate-bar-fill{background:#00E5FF}
.pk-card.bankrupt .rate-bar-fill{background:#FF1744}
.pk-card .team-meta{font-size:9px;color:#666;display:flex;gap:8px}
.pk-card .verdict-icon{font-size:11px}

/* 提交弹窗特效 */
.submission-toast{position:fixed;top:60px;right:-400px;background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);border-radius:10px;padding:10px 16px;z-index:200;font-size:13px;font-weight:700;color:#00E5FF;transition:right .4s cubic-bezier(0.175,0.885,0.32,1.275);white-space:nowrap}
.submission-toast.show{right:16px}
.submission-toast.bankrupt{background:rgba(255,23,68,0.12);border-color:rgba(255,23,68,0.3);color:#FF1744}

/* 散点下钻浮层 */
.drilldown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1A1A2E;border:1px solid rgba(0,229,255,0.2);border-radius:12px;padding:20px;z-index:100;min-width:280px;display:none}
.drilldown h4{color:#00E5FF;font-size:14px;margin-bottom:8px}
.drilldown .info{font-size:12px;color:#aaa;margin:4px 0}
.drilldown .close{position:absolute;top:8px;right:12px;color:#666;cursor:pointer;font-size:18px}
.drilldown .mini-topo{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;min-height:60px;background:rgba(255,255,255,0.03);border-radius:8px;padding:8px}
.drilldown .mini-node{font-size:9px;padding:2px 6px;border-radius:4px;background:#444;color:#ccc}
.drilldown .mini-node.manager{background:#FF6D00;color:#fff}
.drilldown .mini-node.group{background:rgba(0,229,255,0.15);color:#00E5FF;border:1px dashed rgba(0,229,255,0.3)}
</style>
</head>
<body>

<div class="nav-bar">
  <div style="display:flex;align-items:center;gap:16px">
    <span style="font-size:20px">☕</span>
    <span style="font-size:13px;color:#aaa;font-weight:600">咖啡馆敏捷架构沙盘</span>
  </div>
  <!-- 相位指示灯 -->
  <div style="display:flex;align-items:center;gap:4px;margin-left:32px" id="phase-lights">
    <div class="phase-light" data-phase="building"><span class="phase-dot"></span><span class="phase-label">架构搭建</span></div>
    <span style="color:#333;margin:0 2px">▸</span>
    <div class="phase-light" data-phase="crisis"><span class="phase-dot"></span><span class="phase-label">压力测试</span></div>
    <span style="color:#333;margin:0 2px">▸</span>
    <div class="phase-light" data-phase="verdict"><span class="phase-dot"></span><span class="phase-label">判定公布</span></div>
  </div>
  <div class="nav-right">
    <span><span class="status-dot on" id="status-dot"></span><span id="status-text" style="font-size:12px;color:#888">在线</span></span>
    <button class="btn-nav btn-mock" id="btn-mock" onclick="toggleMock()">🎭 Mock演示</button>
    <button class="btn-nav btn-reset" onclick="resetAll()">↻ 重置</button>
  </div>
</div>

<!-- 班级状态 + 危机大按钮 -->
<div style="display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(0,0,0,0.15);border-bottom:1px solid rgba(255,255,255,0.04)">
  <!-- 班级摘要 -->
  <div style="display:flex;gap:16px;font-size:11px">
    <div style="text-align:center"><div style="color:#888">已入场</div><div style="color:#fff;font-weight:700;font-size:16px" id="stat-joined">0</div></div>
    <div style="text-align:center"><div style="color:#888">已提交</div><div style="color:#00E5FF;font-weight:700;font-size:16px" id="stat-submitted">0</div></div>
    <div style="text-align:center"><div style="color:#888">🟢 存活</div><div style="color:#00E5FF;font-weight:700;font-size:16px" id="stat-survived">0</div></div>
    <div style="text-align:center"><div style="color:#888">🔴 破产</div><div style="color:#FF1744;font-weight:700;font-size:16px" id="stat-bankrupt">0</div></div>
  </div>
  <!-- 危机大按钮 -->
  <div id="crisis-banner" style="margin-left:auto;background:linear-gradient(135deg,rgba(255,23,68,0.2),rgba(255,23,68,0.05));border:2px solid rgba(255,23,68,0.4);border-radius:10px;padding:8px 20px;cursor:pointer;text-align:center;transition:all .2s" onclick="triggerCrisis()">
    <div style="font-size:14px;color:#FF1744;font-weight:700">⚡ 外卖平台抽成上调！</div>
    <div style="font-size:10px;color:rgba(255,23,68,0.7)">点击触发 · 学生端60秒倒计时</div>
  </div>
</div>

<div class="main">
  <!-- 左侧雷达图 -->
  <div class="panel panel-left">
    <div class="panel-label">全班生存率实时雷达</div>
    <div class="chart-container" id="radar-chart"></div>
  </div>
  
  <!-- 右侧散点图 -->
  <div class="panel panel-right">
    <div class="panel-label">架构演进散点图 (X:群组数 Y:管理幅度)</div>
    <div class="chart-container" id="scatter-chart"></div>
  </div>
</div>

<!-- PK排行榜 -->
<div class="pk-leaderboard" id="pk-leaderboard"></div>

<!-- 提交弹窗特效 -->
<div class="submission-toast" id="submission-toast"></div>

<!-- 散点下钻浮层 -->
<div class="drilldown" id="drilldown">
  <span class="close" onclick="closeDrilldown()">✕</span>
  <h4 id="drill-name">--</h4>
  <div class="info" id="drill-info"></div>
  <div class="mini-topo" id="drill-topo"></div>
</div>

<script>
// ==================== Echarts 初始化 ====================
const radarDom = document.getElementById('radar-chart');
const scatterDom = document.getElementById('scatter-chart');
const radarChart = echarts.init(radarDom, 'dark');
const scatterChart = echarts.init(scatterDom, 'dark');

// 雷达图配置
const radarOption = {
  color: ['#00E5FF'],
  radar: {
    center: ['50%', '55%'],
    radius: '65%',
    axisName: { color: '#888', fontSize: 10 },
    indicator: [
      { name: '决策效率', max: 100 },
      { name: '沟通成本', max: 100 },
      { name: '执行偏差', max: 100 },
      { name: '管理幅度', max: 100 },
      { name: '响应速度', max: 100 },
      { name: '冗余程度', max: 100 }
    ],
    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } },
    splitArea: { areaStyle: { color: ['rgba(0,229,255,0.02)', 'rgba(0,0,0,0)'] } }
  },
  series: [{
    type: 'radar',
    data: [{ value: [50, 50, 50, 50, 50, 50], name: '全班平均', areaStyle: { color: 'rgba(0,229,255,0.1)' } }],
    symbol: 'circle',
    symbolSize: 5,
    lineStyle: { width: 2 }
  }]
};

// 散点图配置 (含象限参考线)
const scatterOption = {
  grid: { top: 50, right: 30, bottom: 40, left: 55 },
  xAxis: { 
    name: '群组数量', nameTextStyle: { color: '#888', fontSize: 11 }, axisLabel: { color: '#666' }, 
    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } },
    min: 0, max: 8
  },
  yAxis: { 
    name: '平均管理幅度', nameTextStyle: { color: '#888', fontSize: 11 }, axisLabel: { color: '#666' }, 
    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } },
    min: 0, max: 12, inverse: true
  },
  series: [
    { type: 'scatter', symbolSize: 18, data: [], itemStyle: { color: '#00E5FF' }, 
      label: { show: true, formatter: p => p.value[2], fontSize: 9, color: '#ccc', position: 'top' },
      markLine: {
        silent: true,
        symbol: 'none',
        label: { color: '#555', fontSize: 9, formatter: p => p.name },
        lineStyle: { color: 'rgba(255,255,255,0.12)', type: 'dashed', width: 1 },
        data: [
          { xAxis: 3, name: '≥3组', label: { formatter: '≥3组', position: 'end' } },
          { yAxis: 3, name: '幅度≤3', label: { formatter: '安全线', position: 'start' } }
        ]
      },
      // 象限着色区域
      markArea: {
        silent: true,
        data: [
          [{ xAxis: 3, yAxis: 3 }, { xAxis: 8, yAxis: 0 }, { itemStyle: { color: 'rgba(0,229,255,0.04)' }, label: { show: true, color: 'rgba(0,229,255,0.2)', fontSize: 9, position: 'insideTopRight', formatter: '矩阵重组区' } }],
          [{ xAxis: 0, yAxis: 3 }, { xAxis: 3, yAxis: 12 }, { itemStyle: { color: 'rgba(255,23,68,0.04)' }, label: { show: true, color: 'rgba(255,23,68,0.2)', fontSize: 9, position: 'insideBottomLeft', formatter: '直线制崩溃区' } }]
        ]
      }
    }
  ]
};

radarChart.setOption(radarOption);
scatterChart.setOption(scatterOption);

// 响应式
window.addEventListener('resize', () => {
  radarChart.resize();
  scatterChart.resize();
});

// 散点点击下钻
scatterChart.on('click', (params) => {
  if (params.componentType === 'series') {
    const teamName = params.value[2];
    const pointData = scatterData.find(d => d[2] === teamName);
    showDrilldown(pointData);
  }
});

// ==================== 数据状态 ====================
let teamsData = [];
let scatterData = [];
let battleLogs = [];
let mockRunning = false;
let demolishData = {}; // 存详细的团队数据，用于下钻

// ==================== WebSocket ====================
let ws = null;
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(protocol + '//' + location.host);
  
  ws.onopen = () => {
    document.getElementById('status-dot').className = 'status-dot on';
    document.getElementById('status-text').textContent = '在线';
  };
  
  ws.onclose = () => {
    document.getElementById('status-dot').className = 'status-dot off';
    document.getElementById('status-text').textContent = '离线';
    setTimeout(connectWS, 3000);
  };
  
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      // 服务器用的是 Socket.io，但这里的 WebSocket 连接不是...
      // 实际上需要根据服务器事件来处理
      handleWSEvent(e.data);
    } catch {}
  };
}

// 改用轮询作为主要数据获取方式（兼容 Socket.io）
let pollingInterval = null;
let summaryInterval = null;

function startPolling() {
  // 主数据轮询
  pollingInterval = setInterval(async () => {
    if (mockRunning) return;
    try {
      const res = await fetch('/api/dashboard/snapshot');
      const data = await res.json();
      if (data.teams && data.teams.length > 0) {
        updateDashboard(data.teams, data.avg_radar_scores);
      }
    } catch {}
  }, 2000);
  
  // 相位 + 班级摘要轮询
  summaryInterval = setInterval(async () => {
    try {
      const [phaseRes, summaryRes] = await Promise.all([
        fetch('/api/phase'),
        fetch('/api/teams/summary')
      ]);
      updatePhaseLights((await phaseRes.json()).phase);
      updateSummary(await summaryRes.json());
    } catch {}
  }, 2000);
}

function updatePhaseLights(phase) {
  document.querySelectorAll('.phase-light').forEach(el => {
    el.classList.toggle('active', el.dataset.phase === phase);
  });
}

function updateSummary(data) {
  if (!data) return;
  document.getElementById('stat-joined').textContent = data.joined || 0;
  document.getElementById('stat-submitted').textContent = data.submitted || 0;
  document.getElementById('stat-survived').textContent = data.survived || 0;
  document.getElementById('stat-bankrupt').textContent = data.bankrupt || 0;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function parseArchitectureInfo(team) {
  let arch = null;
  try {
    arch = typeof team.architecture === 'string' ? JSON.parse(team.architecture) : team.architecture;
  } catch {}
  const nodes = arch?.nodes || [];
  const groups = arch?.groups || nodes.filter(n => n.type === 'group');
  const edges = arch?.edges || [];
  const shopSpan = edges.filter(e => e.from === 'shop_manager').length || 0;
  return { arch, nodes, groups, groupCount: groups.length, shopSpan };
}

function updateDashboard(teams, avgRadar) {
  if (!teams || teams.length === 0) return;

  if (avgRadar) {
    const values = [
      avgRadar['\u51b3\u7b56\u6548\u7387'], avgRadar['\u6c9f\u901a\u6210\u672c'], avgRadar['\u6267\u884c\u504f\u5dee'],
      avgRadar['\u7ba1\u7406\u5e45\u5ea6'], avgRadar['\u54cd\u5e94\u901f\u5ea6'], avgRadar['\u5197\u4f59\u7a0b\u5ea6']
    ];
    radarChart.setOption({
      series: [{ data: [{ value: values, name: '\u5168\u73ed\u5e73\u5747' }] }]
    });
  }

  scatterData = teams.map(t => {
    const archInfo = parseArchitectureInfo(t);
    const groupCount = archInfo.groupCount;
    const avgSpan = archInfo.shopSpan;

    demolishData[t.team_name] = t;

    return {
      value: [groupCount, avgSpan, t.team_name],
      itemStyle: { color: t.verdict === 'survive' ? '#00E5FF' : '#FF1744' }
    };
  });

  scatterChart.setOption({
    series: [{ data: scatterData.map(d => ({
      value: [d.value[0], d.value[1], d.value[2]],
      itemStyle: d.itemStyle
    })), markLine: scatterOption.series[0].markLine, markArea: scatterOption.series[0].markArea }]
  });

  for (const t of teams) {
    const existing = battleLogs.find(l => l.team_id === t.team_id);
    if (!existing) {
      battleLogs.push(t);
      addBattleLog(t);
    }
  }
}

function addBattleLog(team) {
  renderLeaderboard(battleLogs);
  
  // 弹出特效
  const toast = document.getElementById('submission-toast');
  toast.textContent = (team.verdict === 'survive' ? '🟢 ' : '💀 ') + 
    team.team_name + ' ' + (team.verdict === 'survive' ? '存活!' : '破产!') + ' ' + team.survival_rate + '%';
  toast.className = 'submission-toast ' + (team.verdict === 'bankrupt' ? 'bankrupt' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function renderLeaderboard(teams) {
  const container = document.getElementById('pk-leaderboard');
  const ranked = [...teams].sort((a, b) => (b.survival_rate || 0) - (a.survival_rate || 0));

  container.innerHTML = ranked.map((t, i) => {
    const verdict = t.verdict || 'bankrupt';
    const rankEmoji = i === 0 ? 'TOP1' : i === 1 ? 'TOP2' : i === 2 ? 'TOP3' : '#' + (i + 1);
    const topClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const rate = t.survival_rate || 0;
    const archInfo = parseArchitectureInfo(t);
    const verdictIcon = verdict === 'survive' ? '\u5b58\u6d3b' : '\u7834\u4ea7';

    return `<div class="pk-card ${verdict} ${topClass}">
      <span class="rank-badge" style="font-size:12px;top:6px">${rankEmoji}</span>
      <div class="team-name">${escapeHtml(t.team_name)}</div>
      <div class="team-rate">${rate}%</div>
      <div class="rate-bar"><div class="rate-bar-fill" style="width:${rate}%"></div></div>
      <div class="team-meta">
        <span>${archInfo.groupCount}\u7ec4</span>
        <span>${escapeHtml(t.structure_type || '--')}</span>
        <span class="verdict-icon">${verdictIcon}</span>
      </div>
    </div>`;
  }).join('');
}

function showDrilldown(pointData) {
  if (!pointData) return;
  const team = demolishData[pointData.value[2]];
  if (!team) return;

  const archInfo = parseArchitectureInfo(team);
  const failureReasons = Array.isArray(team.failure_reasons) ? team.failure_reasons : [];
  const teachingPoints = Array.isArray(team.teaching_points) ? team.teaching_points : [];

  document.getElementById('drill-name').textContent = team.team_name;
  document.getElementById('drill-info').innerHTML =
    `\u751f\u5b58\u7387: ${escapeHtml(team.survival_rate)}% | \u7ed3\u6784: ${escapeHtml(team.structure_type || '--')}<br>
    \u5371\u673a: ${team.crisis_passed ? '\u901a\u8fc7' : '\u672a\u901a\u8fc7'} | ${escapeHtml(team.message || '')}<br>
    <span style="color:#FFC107">\u8bca\u65ad</span>: ${failureReasons.map(escapeHtml).join(' / ')}<br>
    <span style="color:#00E5FF">\u590d\u76d8</span>: ${teachingPoints.map(escapeHtml).join(' / ')}`;

  const topoEl = document.getElementById('drill-topo');
  topoEl.innerHTML = '';
  if (archInfo.nodes.length) {
    const managerCount = archInfo.nodes.filter(n => n.type === 'manager').length;
    const staffCount = archInfo.nodes.filter(n => n.type === 'staff').length;
    const groupLabels = archInfo.groups.map(g => escapeHtml(g.label || g.id)).join('\u3001');
    topoEl.innerHTML = `
      <span class="mini-node manager">\u5e97\u957f: ${managerCount}</span>
      <span class="mini-node group">\u5c0f\u7ec4: ${archInfo.groupCount}</span>
      <span class="mini-node staff">\u5458\u5de5: ${staffCount}</span>
      <span class="mini-node group">${groupLabels || '\u672a\u5206\u7ec4'}</span>
    `;
  } else {
    topoEl.innerHTML = '\u7ed3\u6784\u6570\u636e\u52a0\u8f7d\u4e2d...';
  }

  document.getElementById('drilldown').style.display = 'block';
}

function closeDrilldown() {
  document.getElementById('drilldown').style.display = 'none';
}

// ==================== 教师操作 ====================
async function toggleMock() {
  const btn = document.getElementById('btn-mock');
  mockRunning = !mockRunning;
  
  if (mockRunning) {
    btn.textContent = '🎭 Mock运行中';
    btn.classList.add('on');
    startMockLocal();
  } else {
    btn.textContent = '🎭 Mock演示';
    btn.classList.remove('on');
    stopMockLocal();
  }
  
  // 同时通知服务器
  try {
    await fetch('/api/dashboard/snapshot'); // 服务器端通过 WS 控制
  } catch {}
}

let mockInterval = null;
let mockIdx = 0;

function startMockLocal() {
  battleLogs = [];
  document.getElementById('pk-leaderboard').innerHTML = '';
  demolishData = {};
  
  const names = ['赤焰少年队','瑞幸突击队','星巴克战队','飞虎队','海底捞小队','元气森林组','蜜雪冰城连'];
  const results = [
    { rate: 85, msg: '架构存活，效率提升15%', verdict: 'survive', passed: true },
    { rate: 92, msg: '私域护城河建立，绝境翻盘', verdict: 'survive', passed: true },
    { rate: 35, msg: '管理幅度超载，系统瘫痪', verdict: 'bankrupt', passed: false },
    { rate: 72, msg: '架构存活，效率提升8%', verdict: 'survive', passed: true },
    { rate: 28, msg: '管理幅度击穿，瘫痪', verdict: 'bankrupt', passed: false },
    { rate: 95, msg: '矩阵重组完美，存活率95%', verdict: 'survive', passed: true },
    { rate: 15, msg: '未建立私域护城河，破产', verdict: 'bankrupt', passed: false },
  ];
  
  mockIdx = 0;
  mockInterval = setInterval(() => {
    if (mockIdx >= names.length) {
      mockIdx = 0;
      demolishData = {};
      document.getElementById('pk-leaderboard').innerHTML = '';
      battleLogs = [];
      scatterData = [];
    }
    
    const name = names[mockIdx];
    const r = results[mockIdx];
    const radar = {
      '决策效率': Math.round(40 + Math.random() * 55),
      '沟通成本': Math.round(10 + Math.random() * 70),
      '执行偏差': Math.round(10 + Math.random() * 60),
      '管理幅度': Math.round(30 + Math.random() * 65),
      '响应速度': Math.round(20 + Math.random() * 70),
      '冗余程度': Math.round(30 + Math.random() * 60)
    };
    
    const team = {
      team_id: 'mock-' + mockIdx,
      team_name: name,
      survival_rate: r.rate,
      radar_scores: radar,
      crisis_passed: r.passed,
      message: r.msg,
      verdict: r.verdict,
      architecture: JSON.stringify({
        nodes: [
          { id: 'shop_manager', type: 'manager', label: '店长' },
          { id: 'g01', type: 'group', label: '吧台组' },
          ...Array(3).fill(0).map((_, i) => ({ id: 's0' + (i + 1), type: 'staff', label: '员工' })),
          { id: 'g02', type: 'group', label: '外卖组' },
          ...Array(3).fill(0).map((_, i) => ({ id: 's0' + (i + 4), type: 'staff', label: '员工' })),
        ]
      })
    };
    
    demolishData[name] = team;
    
    // 更新图表
    updateDashboard([...Object.values(demolishData)], radar);
    
    // 更新摘要面板
    const teams = Object.values(demolishData);
    updateSummary({
      joined: teams.length,
      submitted: teams.filter(t => t.verdict).length,
      survived: teams.filter(t => t.verdict === 'survive').length,
      bankrupt: teams.filter(t => t.verdict === 'bankrupt').length
    });
    updatePhaseLights('building');
    
    mockIdx++;
  }, 2500);
}

function stopMockLocal() {
  if (mockInterval) { clearInterval(mockInterval); mockInterval = null; }
  battleLogs = [];
  demolishData = {};
  scatterData = [];
  document.getElementById('pk-leaderboard').innerHTML = '';
  updateSummary({ joined: 0, submitted: 0, survived: 0, bankrupt: 0 });
  radarChart.setOption({ series: [{ data: [{ value: [50, 50, 50, 50, 50, 50], name: '全班平均' }] }] });
  scatterChart.setOption({ series: [{ data: [], markLine: scatterOption.series[0].markLine, markArea: scatterOption.series[0].markArea }] });
}

async function triggerCrisis() {
  // 大屏闪红效果
  const banner = document.getElementById('crisis-banner');
  banner.style.boxShadow = '0 0 40px rgba(255,23,68,0.6)';
  banner.style.transform = 'scale(1.03)';
  setTimeout(() => {
    banner.style.boxShadow = '';
    banner.style.transform = '';
  }, 600);
  
  try {
    const res = await fetch('/api/admin/crisis', { method: 'POST' });
    if (res.ok) {
      // 相位自动更新
      updatePhaseLights('crisis');
    }
  } catch {}
}

async function resetAll() {
  await fetch('/api/admin/reset', { method: 'POST' });
  battleLogs = [];
  demolishData = {};
  scatterData = [];
  document.getElementById('pk-leaderboard').innerHTML = '';
  updateSummary({ joined: 0, submitted: 0, survived: 0, bankrupt: 0 });
  updatePhaseLights('building');
  radarChart.setOption({ series: [{ data: [{ value: [50, 50, 50, 50, 50, 50], name: '全班平均' }] }] });
  scatterChart.setOption({ series: [{ data: [], markLine: scatterOption.series[0].markLine, markArea: scatterOption.series[0].markArea }] });
}

// ==================== 初始化 ====================
// 默认开启 Mock 模式，大屏立刻有数据可看
setTimeout(() => {
  startMockLocal();
  document.getElementById('btn-mock').textContent = '🎭 Mock运行中';
  document.getElementById('btn-mock').classList.add('on');
  mockRunning = true;
}, 500);

startPolling();

// F11全屏提示
document.addEventListener('keydown', e => {
  if (e.key === 'F11') { e.preventDefault(); document.documentElement.requestFullscreen(); }
});
